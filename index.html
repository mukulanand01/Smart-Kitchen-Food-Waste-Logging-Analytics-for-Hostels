<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f766e">
    <meta name="description" content="Smart Kitchen — track food waste and get AI-style coaching to reduce it.">
    <title>Smart Kitchen — Sign in</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-body">
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="login-top-row">
                    <h1>Smart Kitchen</h1>
                    <button type="button" class="btn-icon btn-icon--login" aria-label="Toggle dark mode" onclick="toggleMode()">◐</button>
                </div>
                <p>Food waste intelligence for your kitchen</p>
            </div>

           

            <form onsubmit="login(event)" class="login-form" autocomplete="on">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Username" autocomplete="username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
                </div>

                <div class="login-actions">
                    <button type="submit" class="btn-login">Sign in</button>
                    <button type="button" class="btn-secondary btn-small" onclick="localStorage.setItem('login', true); window.location.href='dashboard.html';">Preview dashboard</button>
                </div>
            </form>

            <div class="login-footer">
                <p>Demo credentials: admin / 1234</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
